server:
  port: 8080
  servlet.context-path: /ms

management:
  enabled: false

logging:
  level:
    root: info
    org.springframework: warn
    mirogaudi.memo: info

spring:
  application.name: memo-service
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
    properties:
      hibernate:
        connection.provider_disables_autocommit: true

  flyway:
    locations: classpath:db/migration

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ms-test
    username: sa
    password: # empty
    hikari:
      auto-commit: false

  h2.console:
    enabled: false

springdoc:
  swagger-ui:
    enabled: false

# Memo service (ms)
ms:
  # Default memo priority
  memo-priority: SHORT_TERM
